[custom]

;RULESET
ruleset=ЁЯМН GLOBAL,https://raw.githubusercontent.com/qichiyuhub/rule/master/ProxyLite.list
ruleset=ЁЯТЦ CN,https://raw.githubusercontent.com/qichiyuhub/rule/master/Direct.list
ruleset=ЁЯТЦ CN,[]GEOSITE,CN
ruleset=ЁЯМН GLOBAL,[]GEOSITE,geolocation-!cn
ruleset=ЁЯТЦ CN,[]GEOIP,CN,no-resolve
ruleset=ЁЯРЯ OTHERS,[]FINAL

;PROXYGROUP
custom_proxy_group=ЁЯМН GLOBAL`select`[]DIRECT`[].*
custom_proxy_group=ЁЯТЦ CN`select`[]DIRECT`[].*
custom_proxy_group=ЁЯРЯ OTHERS`select`[]DIRECT`[].*

;CONFIG
enable_rule_generator=true
overwrite_original_rules=true